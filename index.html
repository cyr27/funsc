<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>科学课堂 - 主题题库控制台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; background-color: #0f172a; color: #f8fafc; overflow: hidden; }
        .view-container { display: none; height: 100vh; width: 100%; flex-direction: column; }
        .view-container.active { display: flex; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .mode-btn.active { border-color: #10b981; background-color: #ecfdf5; color: #065f46; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .topic-card { transition: all 0.3s ease; }
        .topic-card:hover { transform: translateY(-2px); border-color: #10b981; }
    </style>
</head>
<body>

    <!-- 1. 入口页 -->
    <div id="view-landing" class="view-container active items-center justify-center p-6">
        <div class="w-full max-w-sm text-center">
            <h1 class="text-6xl font-black mb-2 italic text-transparent bg-clip-text bg-gradient-to-br from-emerald-400 to-blue-500">SCI-PRO</h1>
            <p class="text-slate-500 text-[10px] uppercase tracking-[0.4em] mb-12">智能科学课堂交互系统</p>
            
            <div class="glass-panel p-8 rounded-[2.5rem] space-y-4 mb-8">
                <input type="text" id="stu-name" placeholder="输入学生姓名" class="w-full bg-slate-800/50 py-4 px-6 rounded-2xl border border-white/10 outline-none focus:border-emerald-500 text-center font-bold text-white">
                <input type="text" id="game-code-input" maxlength="6" placeholder="输入 6 位课堂代码" class="w-full bg-slate-800/50 py-4 px-6 rounded-2xl border border-white/10 outline-none focus:border-emerald-500 text-center text-2xl font-mono font-black tracking-widest text-emerald-400">
                <button id="btn-stu-join" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-black shadow-lg shadow-emerald-500/20 active:scale-95 transition-transform">加入课堂</button>
            </div>

            <button id="teacher-entry-trigger" class="px-8 py-3 rounded-full border border-slate-700 text-slate-500 text-[11px] font-black tracking-widest hover:text-white transition-all uppercase">
                Teacher Management
            </button>
        </div>
    </div>

    <!-- 2. 教师后台 -->
    <div id="view-teacher" class="view-container bg-slate-50 text-slate-900">
        <header class="h-16 bg-white border-b px-6 flex items-center justify-between shadow-sm shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center text-white font-black italic shadow-lg shadow-emerald-200">S</div>
                <div>
                    <h2 class="font-black text-slate-800 leading-none">主题控制中心</h2>
                    <span class="text-[10px] text-slate-400 font-bold uppercase">Science Lab Admin</span>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p class="text-[10px] text-slate-400 font-black uppercase">Active Code</p>
                    <div id="active-code-display" class="font-mono font-black text-emerald-600 text-xl tracking-tighter">------</div>
                </div>
                <button onclick="location.reload()" class="p-2 hover:bg-slate-100 rounded-full transition-colors"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></button>
            </div>
        </header>
        
        <div class="flex-1 flex overflow-hidden">
            <!-- 侧边控制栏 -->
            <aside class="w-72 border-r bg-white p-6 flex flex-col gap-6 overflow-y-auto shrink-0">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-3">科学探索主题</label>
                    <select id="t-topic" class="w-full p-4 bg-slate-100 rounded-2xl font-bold border-2 border-transparent focus:border-emerald-500 outline-none appearance-none transition-all cursor-pointer">
                        <option value="人类">🧠 人类</option>
                        <option value="动物">🦁 动物</option>
                        <option value="植物">🌿 植物</option>
                        <option value="物理科学">⚡ 物理科学</option>
                        <option value="材料科学">🧪 材料科学</option>
                        <option value="地球与宇宙">🌌 地球与宇宙</option>
                    </select>
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-3">游戏交互模式</label>
                    <div class="grid grid-cols-1 gap-2">
                        <button id="mode-quiz" class="mode-btn active w-full p-3 rounded-xl border-2 text-left flex items-center gap-3">
                            <div class="w-8 h-8 rounded-lg bg-emerald-100 text-emerald-600 flex items-center justify-center font-bold">Q</div>
                            <div>
                                <p class="font-bold text-sm">Quiz</p>
                                <p class="text-[10px] opacity-60">急速科学竞答</p>
                            </div>
                        </button>
                        <button id="mode-monopoly" class="mode-btn w-full p-3 rounded-xl border-2 border-slate-100 bg-slate-50 text-slate-500 text-left flex items-center gap-3">
                            <div class="w-8 h-8 rounded-lg bg-slate-200 text-slate-400 flex items-center justify-center font-bold">M</div>
                            <div>
                                <p class="font-bold text-sm">Monopoly</p>
                                <p class="text-[10px] opacity-60">科学知识大富翁</p>
                            </div>
                        </button>
                    </div>
                </div>

                <div class="mt-auto pt-6 border-t space-y-3">
                    <button id="btn-save-gen" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black active:scale-95 transition-all shadow-xl shadow-slate-200">创建并同步题库</button>
                    <div id="teacher-controls" class="hidden opacity-0 transform translate-y-4 transition-all duration-500">
                        <button id="btn-start-game" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-emerald-600/20 active:scale-95 transition-all">开启学习挑战</button>
                        <div class="mt-4 flex justify-between items-center px-2">
                            <span class="text-[11px] text-slate-400 font-bold uppercase">Online: <span id="ready-count" class="text-emerald-600">0</span></span>
                            <span id="status-tag" class="text-[10px] bg-slate-200 px-2 py-0.5 rounded uppercase font-black text-slate-500">Standby</span>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- 动态题库编辑器 -->
            <main class="flex-1 p-8 bg-slate-50 overflow-y-auto">
                <div class="max-w-3xl mx-auto">
                    <div class="flex items-center justify-between mb-8">
                        <div>
                            <h2 class="text-2xl font-black text-slate-800 tracking-tight">题目配置清单</h2>
                            <p class="text-slate-400 text-sm">系统已根据主题自动填充 20 道题目</p>
                        </div>
                        <div class="flex items-center gap-2 text-xs font-bold text-slate-400 bg-white px-4 py-2 rounded-full shadow-sm">
                            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                            实时同步就绪
                        </div>
                    </div>
                    <div id="editor-container" class="space-y-4 pb-20">
                        <!-- 20个题目卡片将在此动态渲染 -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- 管理认证 -->
    <div id="login-modal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-xl z-[2000] hidden flex items-center justify-center p-6">
        <div class="bg-white text-slate-900 rounded-[3rem] p-10 w-full max-w-sm shadow-2xl scale-95 animate-in fade-in zoom-in duration-300">
            <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-3xl flex items-center justify-center mb-6 mx-auto">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <h3 class="text-2xl font-black mb-2 text-center">教师认证</h3>
            <p class="text-slate-400 text-xs mb-8 text-center uppercase tracking-widest font-bold">Secure Access Only</p>
            <input type="password" id="admin-pwd" placeholder="输入访问代码" class="w-full bg-slate-100 p-5 rounded-2xl mb-6 outline-none border-2 border-transparent focus:border-emerald-500 text-center text-2xl tracking-[0.5em] font-black transition-all">
            <div class="flex gap-4">
                <button id="btn-cancel-login" class="flex-1 py-4 font-bold text-slate-400 hover:text-slate-600 transition-colors">返回</button>
                <button id="btn-confirm-login" class="flex-1 py-4 bg-slate-900 text-white rounded-2xl font-black active:scale-95 transition-transform shadow-xl">确认登录</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 主题题库数据源
        const topicDatabases = {
            "人类": { icon: "🧠", prefix: "人体知识", base: "关于人类生理、健康与心理的问题" },
            "动物": { icon: "🦁", prefix: "动物世界", base: "关于哺乳动物、昆虫、海洋生物的问题" },
            "植物": { icon: "🌿", prefix: "植物奥秘", base: "关于光合作用、种子、森林生态的问题" },
            "物理科学": { icon: "⚡", prefix: "物理探索", base: "关于力学、电磁学、声光热的问题" },
            "材料科学": { icon: "🧪", prefix: "物质研究", base: "关于化学反应、原子结构、新材料的问题" },
            "地球与宇宙": { icon: "🌌", prefix: "寰宇地理", base: "关于地质构造、行星、黑洞与恒星的问题" }
        };

        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sci-lab-v3';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const state = {
            user: null,
            gameMode: 'quiz',
            currentTopic: '人类',
            questions: []
        };

        const getSessionRef = () => doc(db, 'artifacts', appId, 'public', 'data', 'session_v3', 'current');

        // 生成 20 道基于主题的题目
        function generateQuestions(topic) {
            const info = topicDatabases[topic];
            return Array.from({length: 20}, (_, i) => ({
                q: `${info.icon} ${info.prefix}练习 ${i+1}: 关于${info.base}的一个具体科学问题？`,
                a: ["正确选项 A", "干扰项 B", "干扰项 C", "干扰项 D"],
                c: 0
            }));
        }

        // 渲染编辑器
        function renderEditor() {
            const container = document.getElementById('editor-container');
            container.innerHTML = state.questions.map((q, i) => `
                <div class="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm transition-all hover:shadow-md animate-in slide-in-from-bottom-4 duration-300" style="animation-delay: ${i * 50}ms">
                    <div class="flex items-start gap-4 mb-5">
                        <div class="w-10 h-10 shrink-0 rounded-2xl bg-slate-900 text-white flex items-center justify-center font-black text-sm">${i+1}</div>
                        <textarea onchange="updateQ(${i}, 'q', this.value)" class="w-full bg-slate-50 p-3 rounded-xl font-bold text-slate-700 text-sm outline-none border border-transparent focus:border-emerald-400 focus:bg-white transition-all resize-none" rows="2">${q.q}</textarea>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        ${q.a.map((opt, oi) => `
                            <div class="flex items-center gap-3 bg-slate-50 p-3 rounded-2xl border border-slate-100 group transition-all focus-within:border-emerald-200 focus-within:bg-white">
                                <div class="relative">
                                    <input type="radio" name="correct-${i}" ${q.c === oi ? 'checked' : ''} onchange="updateQ(${i}, 'c', ${oi})" class="w-5 h-5 accent-emerald-500 cursor-pointer">
                                </div>
                                <input type="text" value="${opt}" onchange="updateOpt(${i}, ${oi}, this.value)" class="bg-transparent text-xs w-full font-medium outline-none text-slate-600">
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        window.updateQ = (qi, field, val) => { state.questions[qi][field] = val; };
        window.updateOpt = (qi, oi, val) => { state.questions[qi].a[oi] = val; };

        // 初始化
        function setupHandlers() {
            // 主题切换监听
            const topicSelect = document.getElementById('t-topic');
            topicSelect.addEventListener('change', (e) => {
                state.currentTopic = e.target.value;
                state.questions = generateQuestions(state.currentTopic);
                renderEditor();
            });

            // 模式按钮
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.mode-btn').forEach(b => {
                        b.classList.remove('active', 'border-emerald-500', 'bg-emerald-50', 'text-emerald-700');
                        b.classList.add('border-slate-100', 'bg-slate-50', 'text-slate-500');
                    });
                    btn.classList.add('active', 'border-emerald-500', 'bg-emerald-50', 'text-emerald-700');
                    btn.classList.remove('border-slate-100', 'bg-slate-50', 'text-slate-500');
                    state.gameMode = btn.id.replace('mode-', '');
                });
            });

            // 登录逻辑
            document.getElementById('teacher-entry-trigger').addEventListener('click', () => {
                document.getElementById('login-modal').classList.remove('hidden');
            });
            document.getElementById('btn-cancel-login').addEventListener('click', () => {
                document.getElementById('login-modal').classList.add('hidden');
            });
            document.getElementById('btn-confirm-login').addEventListener('click', () => {
                if (document.getElementById('admin-pwd').value === "8888") {
                    document.getElementById('login-modal').classList.add('hidden');
                    document.getElementById('view-landing').classList.remove('active');
                    document.getElementById('view-teacher').classList.add('active');
                    // 初始加载第一套题
                    state.questions = generateQuestions(state.currentTopic);
                    renderEditor();
                }
            });

            // 创建课堂 (规则3守护)
            document.getElementById('btn-save-gen').addEventListener('click', async () => {
                if (!state.user) return;
                const btn = document.getElementById('btn-save-gen');
                btn.innerText = "正在同步...";
                btn.disabled = true;

                const code = Math.floor(100000 + Math.random() * 899999).toString();
                await setDoc(getSessionRef(), {
                    code,
                    mode: state.gameMode,
                    topic: state.currentTopic,
                    questions: state.questions,
                    status: 'waiting',
                    updatedAt: Date.now(),
                    students: []
                });
                
                btn.innerText = "同步成功!";
                setTimeout(() => { 
                    btn.innerText = "更新课堂题库"; 
                    btn.disabled = false;
                }, 2000);
            });

            document.getElementById('btn-start-game').addEventListener('click', async () => {
                if (!state.user) return;
                await updateDoc(getSessionRef(), { status: 'playing' });
            });
        }

        // 数据订阅 (规则3)
        let unsub = null;
        function initSync() {
            if (!state.user) return;
            if (unsub) unsub();
            unsub = onSnapshot(getSessionRef(), (snap) => {
                if (!snap.exists()) return;
                const data = snap.data();
                document.getElementById('active-code-display').innerText = data.code || '------';
                document.getElementById('ready-count').innerText = data.students?.length || 0;
                document.getElementById('status-tag').innerText = data.status === 'playing' ? 'Playing' : 'Waiting';
                
                const controls = document.getElementById('teacher-controls');
                controls.classList.remove('hidden');
                setTimeout(() => controls.classList.remove('opacity-0', 'translate-y-4'), 10);
            }, (err) => console.error("Firestore Error:", err));
        }

        // 启动流程
        (async () => {
            onAuthStateChanged(auth, (u) => {
                state.user = u;
                if (u) initSync();
            });

            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                setupHandlers();
            } catch (e) { console.error("Auth Fail:", e); }
        })();
    </script>
</body>
</html>
